          </div>
        </td>
        <td style="float:right;"><a href="#" onclick="doLogout();return false;" title=""><img src="../common/img/common/logout_btn.png" alt="로그아웃" style="margin-top:2px;" /></a></td>
        <td style="float:right;"><img src="../common/img/common/top_icon.png" alt="" style="margin-top:5px;" />&nbsp; <a href="#" onclick="return false;" target="space"><span id="topbar-username"></span></a></td>
        <td style="float:right;"><a href="#" onclick="return false;" target="space">공지사항 &nbsp;<span class="no" style="float:right;">0</span></a></td>
      </tr>
    </table>
  </div>

  <div id="content2">
    <div id="nav">
      <center>

        <li class="nav"><a href="layout.html" title=""><span class=""><img src="../common/img/common/nav_icon_1.png" alt="" style="padding-top:2px;"></span> HOME</a></li>

      </ul>
    </div>

    <div id="article">

      <div class="guide">
        <span class="t1">K캅경비구역</span><br>
        <span class="t2">통계</span>
      </div>

      <div class="seiren_box" style="padding-top:0px;">
        <span id="stats-badge-unadjusted" class="no_b" style="float:right;">0</span>
        <p class="bg"><img src="../common/img/common/seiren_icon.png" alt="" /></p>
        <p class="tt">미조치건</p>
      </div>

      <div class="seiren_box" style="padding-top:0px;">
        <span id="stats-badge-alarm" class="no_b" style="float:right;">0</span>

        <p class="tt">경보발생</p>

    </div>

  <div class="footer"><img src="../common/img/common/copy.png" alt="" /></div>

</div>

<script type="text/javascript">
  (function () {
    var d = new Date();
    var el = document.getElementById('topDate');
    if (el) {
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      el.textContent = y + '.' + m + '.' + day;
    }
  })();

  fetch('/api/stats/summary')
    .then(function(res) { return res.json(); })
    .then(function(j) {
      if (j.ok) {
        var unadj = document.getElementById('stats-badge-unadjusted');
        var alarm = document.getElementById('stats-badge-alarm');
        if (unadj) unadj.textContent = j.alarm_active;
        if (alarm) alarm.textContent = j.alarm_active;
      }
    })
    .catch(function() {});
  loadTopbarUser();
</script>
