  <script>
    (function () {
      var d = new Date();
      var el = document.getElementById('topDate');
      if (el) {
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, '0');
        var day = String(d.getDate()).padStart(2, '0');
        el.textContent = y + '.' + m + '.' + day;
      }
    })();

    var allRows = [];
    var filteredRows = [];
    var currentPage = 1;
    var PAGE_SIZE = 10;

    function formatKST(isoStr) {
      if (!isoStr) return '-';
      var d = new Date(isoStr);
      var kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
      var y = kst.getUTCFullYear();
      var mo = String(kst.getUTCMonth() + 1).padStart(2, '0');
      var day = String(kst.getUTCDate()).padStart(2, '0');
      var h = String(kst.getUTCHours()).padStart(2, '0');
      var mi = String(kst.getUTCMinutes()).padStart(2, '0');
      var sec = String(kst.getUTCSeconds()).padStart(2, '0');
      return y + '-' + mo + '-' + day + ' ' + h + ':' + mi + ':' + sec;
    }

    function applyFilter(sword) {
      if (!sword) {
        filteredRows = allRows.slice();
        return;
      }
      var lc = sword.toLowerCase();
      filteredRows = allRows.filter(function(r) {
        var bellNameStr = r.bell_name != null ? r.bell_name.toLowerCase() : '';
        var regionStr   = r.region   != null ? r.region.toLowerCase()   : '';
        var addressStr  = r.address  != null ? r.address.toLowerCase()  : '';
        return bellNameStr.indexOf(lc) !== -1
            || regionStr.indexOf(lc)   !== -1
            || addressStr.indexOf(lc)  !== -1;
      });
    }

    function doSearch() {
      var sword = document.getElementById('bell-sword').value.trim();
      applyFilter(sword);
      currentPage = 1;
      renderPage();
    }

    function goToPage(n) {
      var totalPages = Math.max(1, Math.ceil(filteredRows.length / PAGE_SIZE));
      if (n < 1) n = 1;
      if (n > totalPages) n = totalPages;
      currentPage = n;
      renderPage();
    }

    function renderPage() {
      var tbody = document.getElementById('bell-tbody');
      if (!tbody) return;
      var totalPages = Math.max(1, Math.ceil(filteredRows.length / PAGE_SIZE));
      var start = (currentPage - 1) * PAGE_SIZE;
      var pageRows = filteredRows.slice(start, start + PAGE_SIZE);
      var html = '';
      for (var i = 0; i < pageRows.length; i++) {
        var r = pageRows[i];
        var no = start + i + 1;
        var noCell = r.machine_no != null
          ? (no + '<br><span style="color:#0000cc;">' + r.machine_no + '</span>')
          : String(no);
        var nameCell;
        if (r.region != null || r.bell_name != null) {
          var regionPart = r.region != null ? r.region : '';
          var bellPart   = r.bell_name != null ? '<br><strong><span style="color:#cc0000;">' + r.bell_name + '</span></strong>' : '';
          nameCell = regionPart + bellPart;
        } else {
          nameCell = String(r.phone_no);
        }
        var statusCell;
        if (r.status === '경보발생') {
          statusCell = '<strong><span style="color:#cc0000;">경보발생 (01)</span></strong>';
        } else if (r.status === '정상복구') {
          statusCell = '<span style="color:#2244aa;">정상복구 (03)</span>';
        } else {
          statusCell = r.status || '-';
        }
        var tdStyle = ' style="padding:12px 8px; overflow-wrap:break-word; word-break:break-all;"';
        html += '<tr>'
          + '<td' + tdStyle + '>' + noCell + '</td>'
          + '<td' + tdStyle + '>' + nameCell + '</td>'
          + '<td' + tdStyle + '>' + (r.address != null ? r.address : '-') + '</td>'
          + '<td' + tdStyle + '>' + formatKST(r.occurred_at) + '</td>'
          + '<td' + tdStyle + '>' + statusCell + '</td>'
          + '<td' + tdStyle + '>()</td>'
          + '<td' + tdStyle + '></td>'
          + '<td' + tdStyle + '></td>'
          + '</tr>';
      }
      if (html === '') {
        html = '<tr><td colspan="8">등록된 정보가 없습니다</td></tr>';
      }
      tbody.innerHTML = html;
      renderPaging(totalPages);
    }

    function renderPaging(totalPages) {
      var el = document.getElementById('bell-paging');
      if (!el) return;
      var BLOCK = 10;
      var blockStart = Math.floor((currentPage - 1) / BLOCK) * BLOCK + 1;
      var blockEnd = Math.min(blockStart + BLOCK - 1, totalPages);
      var html = '';
      html += '<a href="#" onclick="goToPage(1);return false;"><img src="../common/img/common/paging_first.gif" alt="처음" onerror="this.outerHTML=\'&laquo;\';" /></a>';
      html += '<a href="#" onclick="goToPage(' + (currentPage - 1) + ');return false;"><img src="../common/img/common/paging_prev.gif" alt="이전" onerror="this.outerHTML=\'&lsaquo;\';" /></a>';
      for (var p = blockStart; p <= blockEnd; p++) {
        if (p === currentPage) {
          html += '<span class="num_ov"><a href="#" onclick="goToPage(' + p + ');return false;" style="text-decoration:none;">' + p + '</a></span> ';
        } else {
          html += '<span class="num"><a href="#" onclick="goToPage(' + p + ');return false;" style="text-decoration:none;"><strong style="font-size:12px;margin:0;color:#000000;">' + p + '</strong></a></span> ';
        }
      }
      html += '<a href="#" onclick="goToPage(' + (currentPage + 1) + ');return false;"><img src="../common/img/common/paging_next.gif" alt="다음" onerror="this.outerHTML=\'&rsaquo;\';" /></a>';
      html += '<a href="#" onclick="goToPage(' + totalPages + ');return false;"><img src="../common/img/common/paging_end.gif" alt="마지막" onerror="this.outerHTML=\'&raquo;\';" /></a>';
      el.innerHTML = html;
    }

    function renderBadges(s) {
      var unadj = document.getElementById('bell-badge-unadjusted');
      var alarm  = document.getElementById('bell-badge-alarm');
      if (unadj) unadj.textContent = s.alarm_active;
      if (alarm)  alarm.textContent  = s.alarm_active;
    }

    function loadData() {
      var savedPage  = currentPage;
      var savedSword = document.getElementById('bell-sword') ? document.getElementById('bell-sword').value.trim() : '';

      fetch('/api/events')
        .then(function(res) { return res.json(); })
        .then(function(j) {
          if (!j.ok) throw new Error('ok:false');
          allRows = j.rows;
          applyFilter(savedSword);
          var totalPages = Math.max(1, Math.ceil(filteredRows.length / PAGE_SIZE));
          currentPage = Math.min(savedPage, totalPages);
          renderPage();
        })
        .catch(function() {
          var tbody = document.getElementById('bell-tbody');
          if (tbody) tbody.innerHTML = '<tr><td colspan="8">데이터를 불러오지 못했습니다</td></tr>';
        });

      fetch('/api/stats/summary')
        .then(function(res) { return res.json(); })
        .then(function(j) { if (j.ok) renderBadges(j); })
        .catch(function() {});
    }

    loadData();
    setInterval(loadData, 30000);
    loadTopbarUser();
  </script>
