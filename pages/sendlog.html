      </tr>
    </table>
  </div>

  <div id="content2">
    <div id="nav">
      <center>
        <img src="../common/img/common/logo.gif" alt="" style="padding-top:20px; padding-bottom:20px;" />

      <ul>
        <li class="nav"><a href="layout.html" title=""><span class=""><img src="../common/img/common/nav_icon_1.png" alt="" style="padding-top:2px;"></span> HOME</a></li>
        <li class="nav"><a href="bell.html" title=""><span class=""><img src="../common/img/common/nav_icon_2.png" alt="" /></span> 비상벨작동정보</a></li>

        <li class="nav"><a href="stats.html" title=""><span class=""><img src="../common/img/common/nav_icon_5.png" alt="" width="23" height="27" /></span> 통계</a></li>
      </ul>
    </div>

    <div id="article">

      <div class="guide">
        <span class="t1">K캅경비구역</span><br>
        <span class="t2">전송로그</span>
      </div>

      <div class="seiren_box" style="padding-top:0px;">
        <span class="no_b" style="float:right;">138</span>
        <p class="bg"><img src="../common/img/common/seiren_icon.png" alt="" /></p>
        <p class="tt">미조치건</p>
      </div>

      <div class="seiren_box" style="padding-top:0px;">
        <span class="no_b" style="float:right;">50</span>
        <p class="bg"><img src="../common/img/common/seiren_icon.png" alt="" /></p>
        <p class="tt">경보발생</p>
      </div>

      <div id="sendlog-summary" style="float:left; width:100%; font-size:13px; margin-top:8px; color:#333;"></div>

      <div style="width:99.9%; float:left; background-color:#fff; margin-top:20px; height:600px; overflow-y:auto;">
        <table class="list" style="margin-bottom:20px;">
          <thead>
            <tr>
              <th width="4%">NO</th>
              <th width="5%">장비번호</th>
              <th width="15%">비상벨명</th>
              <th width="5%">지도</th>
              <th width="10%">지역</th>
              <th width="15%">설치주소</th>
              <th width="10%">전화번호</th>
              <th width="10%">통신상태</th>
            </tr>
          </thead>
          <tbody id="sendlog-tbody"></tbody>
        </table>
      </div>

    </div>
  </div>

  <div class="footer"><img src="../common/img/common/copy.png" alt="" /></div>

</div>

<script type="text/javascript">
  (function () {
    var d = new Date();
    var el = document.getElementById('topDate');
    if (el) {
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      el.textContent = y + '.' + m + '.' + day;
    }
  })();

  function formatPhone(phone_no) {
    var s = '0' + String(phone_no);
    while (s.length < 11) s = '0' + s;
    return s.slice(0, 3) + '-' + s.slice(3, 7) + '-' + s.slice(7, 11);
  }

  function renderRows(rows) {
    var tbody = document.getElementById('sendlog-tbody');
    if (!tbody) return;
    var html = '';
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i];
      var mapCell = (r.lat != null && r.lng != null)
        ? '<span class="link_btn_bg_s"><a href="#" onclick="return false;">보기</a></span>'
        : '-';
      var stateCell = r.comm_state === '통신장애'
        ? '<strong><span style="color:red;">통신장애</span></strong>'
        : r.comm_state || '-';
      html += '<tr>'
        + '<td>' + (i + 1) + '</td>'
        + '<td>' + (r.machine_no != null ? r.machine_no : '-') + '</td>'
        + '<td>' + (r.bell_name != null ? r.bell_name : '-') + '</td>'
        + '<td>' + mapCell + '</td>'
        + '<td>' + (r.region != null ? r.region : '-') + '</td>'
        + '<td>' + (r.address != null ? r.address : '-') + '</td>'
        + '<td>' + formatPhone(r.phone_no) + '</td>'
        + '<td>' + stateCell + '</td>'
        + '</tr>';
    }
    if (html === '') {
      html = '<tr><td colspan="8">데이터를 불러오지 못했습니다</td></tr>';
    }
    tbody.innerHTML = html;
  }

  function renderSummary(s) {
    var el = document.getElementById('sendlog-summary');
    if (!el || !s) return;
    el.textContent = '총 ' + s.total + '건 | 정상 ' + s.normal + ' / 통신장애 ' + s.fault;
  }

  function loadData() {
    fetch('/api/bells')
      .then(function(res) { return res.json(); })
      .then(function(j) {
        if (!j.ok) throw new Error('ok:false');
        renderRows(j.rows);
      })
      .catch(function() {
        var tbody = document.getElementById('sendlog-tbody');
        if (tbody) tbody.innerHTML = '<tr><td colspan="8">데이터를 불러오지 못했습니다</td></tr>';
      });

    fetch('/api/stats/summary')
      .then(function(res) { return res.json(); })
      .then(function(j) { if (j.ok) renderSummary(j); })
      .catch(function() {});
  }

  loadData();
  setInterval(loadData, 30000);
</script>

</body>
</html>
