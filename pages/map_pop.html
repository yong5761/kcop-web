<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>멀티벨 관리시스템</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #map { width: 100%; height: 100%; }
    #no-location { display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 18px; color: #666; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var lat     = parseFloat(params.get('lat'));
      var lng     = parseFloat(params.get('lng'));
      var name    = params.get('name')    || '';
      var address = params.get('address') || '';

      if (name) document.title = name;

      if (!lat || !lng) {
        document.getElementById('map').outerHTML = '<div id="no-location">위치 정보 없음</div>';
        return;
      }

      var s = document.createElement('script');
      s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=4f8113e9d33b19b56daeda4b73e65b78&autoload=false';
      s.onload = function () {
        kakao.maps.load(function () {
          var container = document.getElementById('map');
          var options = { center: new kakao.maps.LatLng(lat, lng), level: 3 };
          var map = new kakao.maps.Map(container, options);
          var markerPos = new kakao.maps.LatLng(lat, lng);
          var marker = new kakao.maps.Marker({ map: map, position: markerPos });
          var infoContent = '<div style="padding:6px 10px;font-size:13px;line-height:1.5;">'
            + (name    ? '<strong>' + name + '</strong>' : '')
            + (address ? '<br>' + address : '')
            + '</div>';
          var infowindow = new kakao.maps.InfoWindow({ content: infoContent });
          infowindow.open(map, marker);
        });
      };
      s.onerror = function () {
        document.getElementById('map').innerHTML = '<div style="padding:20px;color:red;font-size:15px;">지도를 불러오지 못했습니다.</div>';
      };
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
