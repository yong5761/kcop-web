  <script src="../common/js/map-popup.js"></script>
  <script>
    (function () {
      var d = new Date();
      var el = document.getElementById('topDate');
      if (el) {
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, '0');
        var day = String(d.getDate()).padStart(2, '0');
        el.textContent = y + '.' + m + '.' + day;
      }
    })();

    function escJs(s) {
      if (s == null) return '';
      return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\r/g, '').replace(/\n/g, ' ');
    }

    var allRows = [];
    var filteredRows = [];
    var currentPage = 1;
    var PAGE_SIZE = 10;

    function formatPhone(phone_no) {
      var s = '0' + String(phone_no);
      while (s.length < 11) s = '0' + s;
      return s.slice(0, 3) + '-' + s.slice(3, 7) + '-' + s.slice(7, 11);
    }

    function applyFilter(sword) {
      if (!sword) {
        filteredRows = allRows.slice();
        return;
      }
      var lc = sword.toLowerCase();
      filteredRows = allRows.filter(function(r) {
        var machineStr  = r.machine_no != null ? String(r.machine_no).toLowerCase() : '';
        var bellNameStr = r.bell_name  != null ? r.bell_name.toLowerCase()          : '';
        var regionStr   = r.region     != null ? r.region.toLowerCase()             : '';
        var addressStr  = r.address    != null ? r.address.toLowerCase()            : '';
        var phoneRaw    = String(r.phone_no);
        var phoneFmt    = formatPhone(r.phone_no);
        return machineStr.indexOf(lc)  !== -1
            || bellNameStr.indexOf(lc) !== -1
            || regionStr.indexOf(lc)   !== -1
            || addressStr.indexOf(lc)  !== -1
            || phoneRaw.indexOf(lc)    !== -1
            || phoneFmt.indexOf(lc)    !== -1;
      });
    }

    function doSearch() {
      var sword = document.getElementById('data-sword').value.trim();
      applyFilter(sword);
      currentPage = 1;
      renderPage();
    }

    function goToPage(n) {
      var totalPages = Math.max(1, Math.ceil(filteredRows.length / PAGE_SIZE));
      if (n < 1) n = 1;
      if (n > totalPages) n = totalPages;
      currentPage = n;
      renderPage();
    }

    function renderPage() {
      var tbody = document.getElementById('data-tbody');
      if (!tbody) return;

      var totalPages = Math.max(1, Math.ceil(filteredRows.length / PAGE_SIZE));
      var start = (currentPage - 1) * PAGE_SIZE;
      var pageRows = filteredRows.slice(start, start + PAGE_SIZE);

      var html = '';
      for (var i = 0; i < pageRows.length; i++) {
        var r = pageRows[i];
        var no = start + i + 1;
        var mapCell = (r.lat != null && r.lng != null)
          ? '<span class="link_btn_bg_s"><a href="#" onclick="showBellMap(' + r.lat + ',' + r.lng + ',\'' + escJs(r.bell_name) + '\',\'' + escJs(r.address) + '\');return false;">보기</a></span>'
          : '-';
        html += '<tr>'
          + '<td>' + no + '</td>'
          + '<td>' + (r.machine_no != null ? r.machine_no : '-') + '</td>'
          + '<td>' + (r.bell_name  != null ? r.bell_name  : '-') + '</td>'
          + '<td>' + (r.lat        != null ? r.lat        : '-') + '</td>'
          + '<td>' + (r.lng        != null ? r.lng        : '-') + '</td>'
          + '<td>' + mapCell + '</td>'
          + '<td>' + (r.region     != null ? r.region     : '-') + '</td>'
          + '<td>' + (r.address    != null ? r.address    : '-') + '</td>'
          + '<td>' + formatPhone(r.phone_no) + '</td>'
          + '<td>비상벨</td>'
          + '<td><span class="link_btn_bg_s"><a href="#" onclick="return false;">수정</a></span> <span class="link_btn_bg_s"><a href="#" onclick="return false;">삭제</a></span></td>'
          + '</tr>';
      }
      if (html === '') {
        html = '<tr><td colspan="11">데이터를 불러오지 못했습니다</td></tr>';
      }
      tbody.innerHTML = html;

      renderPaging(totalPages);
    }

    function renderPaging(totalPages) {
      var el = document.getElementById('data-paging');
      if (!el) return;
      var BLOCK = 10;
      var blockStart = Math.floor((currentPage - 1) / BLOCK) * BLOCK + 1;
      var blockEnd = Math.min(blockStart + BLOCK - 1, totalPages);
      var html = '';
      html += '<a href="#" onclick="goToPage(1);return false;"><img src="../common/img/common/paging_first.gif" alt="처음" onerror="this.outerHTML=\'&laquo;\';" /></a>';
      html += '<a href="#" onclick="goToPage(' + (currentPage - 1) + ');return false;"><img src="../common/img/common/paging_prev.gif" alt="이전" onerror="this.outerHTML=\'&lsaquo;\';" /></a>';
      for (var p = blockStart; p <= blockEnd; p++) {
        if (p === currentPage) {
          html += '<span class="num_ov"><a href="#" onclick="goToPage(' + p + ');return false;" style="text-decoration:none;">' + p + '</a></span> ';
        } else {
          html += '<span class="num"><a href="#" onclick="goToPage(' + p + ');return false;" style="text-decoration:none;"><strong style="font-size:12px;margin:0;color:#000000;">' + p + '</strong></a></span> ';
        }
      }
      html += '<a href="#" onclick="goToPage(' + (currentPage + 1) + ');return false;"><img src="../common/img/common/paging_next.gif" alt="다음" onerror="this.outerHTML=\'&rsaquo;\';" /></a>';
      html += '<a href="#" onclick="goToPage(' + totalPages + ');return false;"><img src="../common/img/common/paging_end.gif" alt="마지막" onerror="this.outerHTML=\'&raquo;\';" /></a>';
      el.innerHTML = html;
    }

    function renderSummary(s) {
      var el = document.getElementById('data-summary');
      if (!el || !s) return;
      el.textContent = '총 ' + s.total + '건 | 정상 ' + s.normal + ' / 통신장애 ' + s.fault;
      var unadj = document.getElementById('data-badge-unadjusted');
      var alarm = document.getElementById('data-badge-alarm');
      if (unadj) unadj.textContent = s.alarm_active;
      if (alarm) alarm.textContent = s.alarm_active;
    }

    function loadData() {
      var savedPage = currentPage;
      var savedSword = document.getElementById('data-sword') ? document.getElementById('data-sword').value.trim() : '';

      fetch('/api/bells')
        .then(function(res) { return res.json(); })
        .then(function(j) {
          if (!j.ok) throw new Error('ok:false');
          allRows = j.rows;
          applyFilter(savedSword);
          var totalPages = Math.max(1, Math.ceil(filteredRows.length / PAGE_SIZE));
          currentPage = Math.min(savedPage, totalPages);
          renderPage();
        })
        .catch(function() {
          var tbody = document.getElementById('data-tbody');
          if (tbody) tbody.innerHTML = '<tr><td colspan="11">데이터를 불러오지 못했습니다</td></tr>';
        });

      fetch('/api/stats/summary')
        .then(function(res) { return res.json(); })
        .then(function(j) { if (j.ok) renderSummary(j); })
        .catch(function() {});
    }

    loadData();
    setInterval(loadData, 30000);
    loadTopbarUser();
  </script>
