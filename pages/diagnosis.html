  <div id="content2">

<script src="../common/js/map-popup.js"></script>
<script type="text/javascript">
  (function () {
    var d = new Date();
    var el = document.getElementById('topDate');
    if (el) {
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      el.textContent = y + '.' + m + '.' + day;
    }
  })();

  function escJs(s) {
    if (s == null) return '';
    return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/\r/g, '').replace(/\n/g, ' ');
  }

  var allRows = [];
  var filteredRows = [];
  var currentPage = 1;
  var PAGE_SIZE = 10;

  function formatPhone(phone_no) {
    var s = '0' + String(phone_no);
    while (s.length < 11) s = '0' + s;
    return s.slice(0, 3) + '-' + s.slice(3, 7) + '-' + s.slice(7, 11);
  }

  function formatLastSeen(isoStr) {
    if (!isoStr) return null;
    var d = new Date(isoStr);
    var kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
    var y = kst.getUTCFullYear();
    var mo = String(kst.getUTCMonth() + 1).padStart(2, '0');
    var day = String(kst.getUTCDate()).padStart(2, '0');
    var h = String(kst.getUTCHours()).padStart(2, '0');
    var mi = String(kst.getUTCMinutes()).padStart(2, '0');
    var sec = String(kst.getUTCSeconds()).padStart(2, '0');
    return y + '-' + mo + '-' + day + ' ' + h + ':' + mi + ':' + sec;
  }

  function applyFilter(sword) {
    if (!sword) {
      filteredRows = allRows.slice();
      return;
    }
    var lc = sword.toLowerCase();
    filteredRows = allRows.filter(function(r) {
      var machineStr  = r.machine_no != null ? String(r.machine_no).toLowerCase() : '';
      var bellNameStr = r.bell_name  != null ? r.bell_name.toLowerCase()          : '';
      var regionStr   = r.region     != null ? r.region.toLowerCase()             : '';
      var addressStr  = r.address    != null ? r.address.toLowerCase()            : '';
      var phoneRaw    = String(r.phone_no);
      var phoneFmt    = formatPhone(r.phone_no);
      return machineStr.indexOf(lc)  !== -1
          || bellNameStr.indexOf(lc) !== -1
          || regionStr.indexOf(lc)   !== -1
          || addressStr.indexOf(lc)  !== -1
          || phoneRaw.indexOf(lc)    !== -1
          || phoneFmt.indexOf(lc)    !== -1;
    });
  }

  function doSearch() {
    var sword = document.getElementById('diag-sword').value.trim();
    applyFilter(sword);
    currentPage = 1;
    renderPage();
  }

  function goToPage(n) {
    var totalPages = Math.max(1, Math.ceil(filteredRows.length / PAGE_SIZE));
    if (n < 1) n = 1;
    if (n > totalPages) n = totalPages;
    currentPage = n;
    renderPage();
  }

  function renderPage() {
    var tbody = document.getElementById('diag-tbody');
    if (!tbody) return;

    var totalPages = Math.max(1, Math.ceil(filteredRows.length / PAGE_SIZE));
    var start = (currentPage - 1) * PAGE_SIZE;
    var pageRows = filteredRows.slice(start, start + PAGE_SIZE);

    var html = '';
    for (var i = 0; i < pageRows.length; i++) {
      var r = pageRows[i];
      var no = start + i + 1;
      var mapCell = (r.lat != null && r.lng != null)
        ? '<span class="link_btn_bg_s"><a href="#" onclick="showBellMap(' + r.lat + ',' + r.lng + ',\'' + escJs(r.bell_name) + '\',\'' + escJs(r.address) + '\');return false;">보기</a></span>'
        : '-';
      var isFault = r.comm_state === '통신장애';
      var stateCell = isFault
        ? '<strong><span style="color:#cc0000;">통신장애</span></strong>'
        : '<span style="color:#2244aa;">' + (r.comm_state || '-') + '</span>';
      var lastSeenStr = formatLastSeen(r.last_seen);
      var fw = (r.fw_version != null && r.fw_version !== '') ? ' (' + r.fw_version + ')' : '';
      var lastSeenCell = lastSeenStr
        ? '<span style="color:' + (isFault ? '#cc0000' : '#2244aa') + ';">' + lastSeenStr + fw + '</span>'
        : '<strong><span style="color:#cc0000;">수신데이타 없음</span></strong>';
      html += '<tr>'
        + '<td>-</td>'
        + '<td>' + (r.machine_no != null ? r.machine_no : '-') + '</td>'
        + '<td>' + (r.bell_name  != null ? r.bell_name  : '-') + '</td>'
        + '<td>' + mapCell + '</td>'
        + '<td>' + (r.region     != null ? r.region     : '-') + '</td>'
        + '<td>' + (r.address    != null ? r.address    : '-') + '</td>'
        + '<td>' + formatPhone(r.phone_no) + '</td>'
        + '<td class="diag-state-cell" data-phone="' + r.phone_no + '" style="cursor:help;">' + stateCell + '</td>'
        + '<td>' + lastSeenCell + '</td>'
        + '<td></td>'
        + '</tr>';
    }
    if (html === '') {
      html = '<tr><td colspan="10">데이터를 불러오지 못했습니다</td></tr>';
    }
    tbody.innerHTML = html;

    renderPaging(totalPages);
  }

  function renderPaging(totalPages) {
    var el = document.getElementById('diag-paging');
    if (!el) return;
    var BLOCK = 10;
    var blockStart = Math.floor((currentPage - 1) / BLOCK) * BLOCK + 1;
    var blockEnd = Math.min(blockStart + BLOCK - 1, totalPages);
    var html = '';
    html += '<a href="#" onclick="goToPage(1);return false;"><img src="../common/img/common/paging_first.gif" alt="처음" /></a>';
    html += '<a href="#" onclick="goToPage(' + (currentPage - 1) + ');return false;"><img src="../common/img/common/paging_prev.gif" alt="이전" /></a>';
    for (var p = blockStart; p <= blockEnd; p++) {
      if (p === currentPage) {
        html += '<span class="num_ov"><a href="#" onclick="goToPage(' + p + ');return false;" style="text-decoration:none;">' + p + '</a></span> ';
      } else {
        html += '<span class="num"><a href="#" onclick="goToPage(' + p + ');return false;" style="text-decoration:none;"><strong style="font-size:12px;margin:0px 0px 0 0;color:#000000;">' + p + '</strong></a></span> ';
      }
    }
    html += '<a href="#" onclick="goToPage(' + (currentPage + 1) + ');return false;"><img src="../common/img/common/paging_next.gif" alt="다음" /></a>';
    html += '<a href="#" onclick="goToPage(' + totalPages + ');return false;"><img src="../common/img/common/paging_end.gif" alt="마지막" /></a>';
    el.innerHTML = html;
  }

  function renderSummary(s) {
    var el = document.getElementById('diag-summary');
    if (!el || !s) return;
    el.textContent = '총 ' + s.total + '건 | 정상 ' + s.normal + ' / 통신장애 ' + s.fault;
    var unadj = document.getElementById('diagnosis-badge-unadjusted');
    var alarm = document.getElementById('diagnosis-badge-alarm');
    if (unadj) unadj.textContent = s.alarm_active;
    if (alarm) alarm.textContent = s.alarm_today;
  }

  function loadData() {
    var savedPage = currentPage;
    var savedSword = document.getElementById('diag-sword') ? document.getElementById('diag-sword').value.trim() : '';

    fetch('/api/bells')
      .then(function(res) { return res.json(); })
      .then(function(j) {
        if (!j.ok) throw new Error('ok:false');
        allRows = j.rows;
        applyFilter(savedSword);
        var totalPages = Math.max(1, Math.ceil(filteredRows.length / PAGE_SIZE));
        currentPage = Math.min(savedPage, totalPages);
        renderPage();
      })
      .catch(function() {
        var tbody = document.getElementById('diag-tbody');
        if (tbody) tbody.innerHTML = '<tr><td colspan="10">데이터를 불러오지 못했습니다</td></tr>';
      });

    fetch('/api/stats/summary')
      .then(function(res) { return res.json(); })
      .then(function(j) { if (j.ok) renderSummary(j); })
      .catch(function() {});
  }

  loadData();
  setInterval(loadData, 30000);

  var tipCache = {};
  var tipEl = null;
  var tipCurrentPhone = null;

  function getTip() {
    if (!tipEl) {
      tipEl = document.createElement('div');
      tipEl.style.cssText = 'position:fixed;background:#222;color:#fff;font-size:12px;line-height:1.7;padding:8px 12px;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,0.5);z-index:99999;pointer-events:none;display:none;max-width:360px;white-space:nowrap;';
      document.body.appendChild(tipEl);
    }
    return tipEl;
  }

  function hideTip() {
    getTip().style.display = 'none';
    tipCurrentPhone = null;
  }

  function positionTip(cx, cy) {
    var tip = getTip();
    tip.style.left = (cx + 16) + 'px';
    tip.style.top  = (cy + 16) + 'px';
    var r = tip.getBoundingClientRect();
    if (r.right  > window.innerWidth)  tip.style.left = (cx - r.width  - 4) + 'px';
    if (r.bottom > window.innerHeight) tip.style.top  = (cy - r.height - 4) + 'px';
  }

  function formatKSTTip(isoStr) {
    if (!isoStr) return '-';
    var d = new Date(isoStr);
    var kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
    var y  = kst.getUTCFullYear();
    var mo = String(kst.getUTCMonth() + 1).padStart(2, '0');
    var dy = String(kst.getUTCDate()).padStart(2, '0');
    var h  = String(kst.getUTCHours()).padStart(2, '0');
    var mi = String(kst.getUTCMinutes()).padStart(2, '0');
    var sec= String(kst.getUTCSeconds()).padStart(2, '0');
    return y + '-' + mo + '-' + dy + ' ' + h + ':' + mi + ':' + sec;
  }

  function buildTipHtml(data) {
    if (!data) return '수신 데이터 없음';
    var bellText = data.bellnumber + (data.bellnumber !== 0 ? ' (경보!)' : ' (평상시)');
    var bellLine = data.is_alarm
      ? '<span style="color:#ff8888;">경보번호(bellnumber): ' + bellText + '</span>'
      : '경보번호(bellnumber): ' + bellText;
    return '수신시각: '             + formatKSTTip(data.received_at)
      + '<br>전화번호: '            + data.phone_no
      + '<br>'                      + bellLine
      + '<br>시퀀스: '              + data.seqnum
      + '<br>전압: '                + data.voltage
      + '<br>벨상태(bellstatus): '  + data.bellstatus
      + '<br>장비번호(machinenum): ' + data.machinenum
      + '<br>펌웨어: '              + data.fw_version
      + '<br>체크섬: '              + data.chksum + ' (' + (data.checksum_ok ? '✓ 정상' : '✗ 오류') + ')'
      + '<br>RAW: <span style="font-family:monospace;font-size:11px;">' + data.raw_msg + '</span>';
  }

  function findStateCell(el) {
    while (el && el.tagName) {
      if (el.tagName === 'TD' && el.getAttribute('data-phone')) return el;
      if (el.tagName === 'TR' || el.tagName === 'TABLE') return null;
      el = el.parentNode;
    }
    return null;
  }

  document.addEventListener('mouseover', function(e) {
    var cell = findStateCell(e.target);
    if (!cell) { hideTip(); return; }
    var phone = cell.getAttribute('data-phone');
    if (phone === tipCurrentPhone) return;
    tipCurrentPhone = phone;
    var tip = getTip();
    tip.innerHTML = '불러오는 중...';
    tip.style.display = 'block';
    positionTip(e.clientX, e.clientY);
    if (tipCache[phone] !== undefined) {
      tip.innerHTML = buildTipHtml(tipCache[phone]);
      positionTip(e.clientX, e.clientY);
      return;
    }
    fetch('/api/bells/' + phone + '/last-packet')
      .then(function(r) { return r.json(); })
      .then(function(j) {
        tipCache[phone] = j.ok ? j.data : null;
        if (tipCurrentPhone === phone) getTip().innerHTML = buildTipHtml(tipCache[phone]);
      })
      .catch(function() {
        tipCache[phone] = null;
        if (tipCurrentPhone === phone) getTip().innerHTML = '패킷 조회 오류';
      });
  });

  document.addEventListener('mousemove', function(e) {
    var tip = getTip();
    if (tip.style.display === 'none') return;
    positionTip(e.clientX, e.clientY);
  });

  document.addEventListener('mouseout', function(e) {
    var cell = findStateCell(e.target);
    if (!cell) return;
    var t = e.relatedTarget;
    while (t) {
      if (t === cell) return;
      t = t.parentNode;
    }
    hideTip();
  });
  loadTopbarUser();
</script>
