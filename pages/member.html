#modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.45);z-index:9999;align-items:flex-start;justify-content:center;}

.mhd .mcls{cursor:pointer;font-size:18px;line-height:1;opacity:.8;}

.btn-cl:hover{background:#777;}
#table-body td{font-size:12px;}
.link_btn_bg a, .link_btn_bg a span, #reg-btn-label{color:#ffffff !important;}
</style>

        <li class="nav admin-only"><a href="sendlog.html" title=""><span class=""><img src="../common/img/common/nav_icon_6.png" alt="" width="23" height="27" /></span> 전송로그</a></li>

      <p class="write_btn">

      <div id="search">
        <form name="searchForm" onsubmit="doSearch(); return false;">

          <input type="text" class="input01" style="width:40%;" id="sword" name="sword" value="" />

<!-- 등록/수정 모달 -->
<div id="modal-overlay" onclick="overlayClick(event)">
  <div id="modal-box">
    <div class="mhd">
      <span id="modal-title">등록</span>
      <span class="mcls" onclick="closeModal()">&#10005;</span>
    </div>
    <div class="mbody" id="modal-fields"></div>
    <div class="mft">
      <button class="btn-sv" onclick="saveModal()">저장</button>

    </div>

<script type="text/javascript">
// ── 상태 ──────────────────────────────────────────────────────────────────────
var bigCartData  = [];
var jungCartData = [];
var currentTab   = 1;
var currentRows  = [];
var rowMap       = {};
var editIdx      = null;

var tabLabels = {1:'본사관리자', 2:'지역관리자', 3:'조치자', 4:'지역 카테고리', 5:'구/군 카테고리'};
var regLabels = {1:'관리자등록', 2:'관리자등록', 3:'조치자등록', 4:'지역등록', 5:'구/군등록'};

// ── 초기화 ────────────────────────────────────────────────────────────────────
(function () {
  var d = new Date();
  var el = document.getElementById('topDate');
  if (el) el.textContent = d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
})();

var _initCnt = 0;
function _tryInit() { if (++_initCnt === 2) switchTab(1); }

fetch('/api/members/big-cart')
  .then(function(r){return r.json();})
  .then(function(j){ if(j.ok) bigCartData = j.rows; _tryInit(); })
  .catch(_tryInit);

fetch('/api/members/jung-cart')
  .then(function(r){return r.json();})
  .then(function(j){ if(j.ok) jungCartData = j.rows; _tryInit(); })
  .catch(_tryInit);

fetch('/api/stats/summary')
  .then(function(r){return r.json();})
  .then(function(j){
    if(j.ok){
      var u = document.getElementById('member-badge-unadjusted');
      var a = document.getElementById('member-badge-alarm');
      if(u) u.textContent = j.alarm_active;
      if(a) a.textContent = j.alarm_today;
    }
  }).catch(function(){});

// ── 유틸 ──────────────────────────────────────────────────────────────────────
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getBigName(num) {
  var f = bigCartData.filter(function(b){ return b.big_num == num; })[0];
  return f ? esc(f.big_name) : String(num||'-');
}

function getJungName(num) {
  var f = jungCartData.filter(function(j){ return j.jung_num == num; })[0];
  return f ? esc(f.jung_name) : String(num||'-');
}

function gv(id) { var e = document.getElementById(id); return e ? e.value.trim() : ''; }

// ── 탭 전환 ──────────────────────────────────────────────────────────────────
function switchTab(n) {
  currentTab = n;
  for (var i = 1; i <= 5; i++)
    document.getElementById('memtab-'+i).className = (i === n ? 'tab_ov' : 'tab_');
  document.getElementById('guide-sub').textContent    = tabLabels[n] + ' 등록/관리';
  document.getElementById('reg-btn-label').textContent = regLabels[n];
  document.getElementById('search').style.display     = (n <= 3) ? '' : 'none';
  loadData();
}

// ── 데이터 로드 ───────────────────────────────────────────────────────────────
function loadData() {
  var tbody = document.getElementById('table-body');
  tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:20px;color:#888;">로딩 중...</td></tr>';

  if (currentTab <= 3) {
    fetch('/api/members?type=' + currentTab)
      .then(function(r){ return r.json(); })
      .then(function(j){
        if (j.ok) {
          currentRows = j.rows;
          rowMap = {};
          j.rows.forEach(function(r){ rowMap[r.idx] = r; });
          renderMembers(j.rows);
        } else {
          tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:20px;color:red;">API 오류: ' + esc(j.error) + '</td></tr>';
        }
      })
      .catch(function(){
        tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;padding:20px;color:red;">서버 연결 실패. 서버가 실행 중인지 확인하세요.</td></tr>';
      });
  } else if (currentTab === 4) {
    fetch('/api/members/big-cart')
      .then(function(r){ return r.json(); })
      .then(function(j){ if(j.ok){ bigCartData = j.rows; renderBigCart(j.rows); }});
  } else {
    fetch('/api/members/jung-cart')
      .then(function(r){ return r.json(); })
      .then(function(j){ if(j.ok) renderJungCart(j.rows); });
  }
}

// ── 렌더링 ────────────────────────────────────────────────────────────────────
function editDelBtns(idx) {
  return '<span class="link_btn_bg_s"><a href="#" onclick="openEditModal('+idx+'); return false;">수정</a></span> ' +
         '<span class="link_btn_bg_s"><a href="#" onclick="deleteMember('+idx+'); return false;">삭제</a></span>';
}

function renderMembers(rows) {
  var thead = document.getElementById('table-head');
  var tbody = document.getElementById('table-body');

  if (!rows.length) {
    thead.innerHTML = '';
    tbody.innerHTML = '<tr><td style="text-align:center;padding:20px;color:#888;">등록된 계정이 없습니다.</td></tr>';
    return;
  }

  if (currentTab === 1) {
    thead.innerHTML =
      '<tr><th width="20%">관리자명</th><th width="20%">아이디</th><th width="15%">번호</th><th width="30%">비고</th><th width="15%">수정/삭제</th></tr>';
    tbody.innerHTML = rows.map(function(r){
      return '<tr>' +
        '<td>' + esc(r.mem_name) + '</td>' +
        '<td>' + esc(r.mem_id)   + '</td>' +
        '<td>' + esc(r.gateway_no || '-') + '</td>' +
        '<td>' + esc(r.etc_value || '-') + '</td>' +
        '<td>' + editDelBtns(r.idx) + '</td>' +
        '</tr>';
    }).join('');
  } else if (currentTab === 2) {
    thead.innerHTML =
      '<tr><th width="10%">지역</th><th width="10%">지역관리명</th><th width="10%">아이디</th><th width="10%">번호</th><th width="10%">대표전화</th><th width="15%">비고</th><th width="10%">수정/삭제</th></tr>';
    tbody.innerHTML = rows.map(function(r){
      return '<tr>' +
        '<td>' + getBigName(r.c1) + ' / ' + getJungName(r.c2) + '</td>' +
        '<td>' + esc(r.mem_name)             + '</td>' +
        '<td>' + esc(r.mem_id)               + '</td>' +
        '<td>' + esc(r.gateway_no || '-')    + '</td>' +
        '<td>' + esc(r.mem_tel || '-')       + '</td>' +
        '<td>' + esc(r.etc_value || '-')     + '</td>' +
        '<td>' + editDelBtns(r.idx)          + '</td>' +
        '</tr>';
    }).join('');
  } else {
    thead.innerHTML =
      '<tr><th>조치자명</th><th>아이디</th><th>전화번호</th><th>지역</th><th>구/군</th><th>비고</th><th>수정/삭제</th></tr>';
    tbody.innerHTML = rows.map(function(r){
      return '<tr>' +
        '<td>' + esc(r.mem_name)       + '</td>' +
        '<td>' + esc(r.mem_id)         + '</td>' +
        '<td>' + esc(r.mem_tel || '-') + '</td>' +
        '<td>' + getBigName(r.c1)      + '</td>' +
        '<td>' + getJungName(r.c2)     + '</td>' +
        '<td>' + esc(r.etc_value || '-') + '</td>' +
        '<td>' + editDelBtns(r.idx) + '</td>' +
        '</tr>';
    }).join('');
  }
}

function renderBigCart(rows) {
  var thead = document.getElementById('table-head');
  var tbody = document.getElementById('table-body');
  thead.innerHTML = '<tr><th width="10%">번호</th><th width="60%">지역명</th><th width="30%">수정 / 삭제</th></tr>';
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px;color:#888;">등록된 지역이 없습니다.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(function(r){
    return '<tr>' +
      '<td>' + r.big_num + '</td>' +
      '<td>' + esc(r.big_name) + '</td>' +
      '<td>' +
        '<span class="link_btn_bg_s"><a href="#" onclick="openBigCartEdit('+r.big_num+',\''+esc(r.big_name)+'\'); return false;">수정</a></span> ' +
        '<span class="link_btn_bg_s"><a href="#" onclick="deleteBigCart('+r.big_num+'); return false;">삭제</a></span>' +
      '</td></tr>';
  }).join('');
}

function renderJungCart(rows) {
  var thead = document.getElementById('table-head');
  var tbody = document.getElementById('table-body');
  thead.innerHTML = '<tr><th width="8%">번호</th><th width="35%">명칭</th><th width="25%">상위지역</th><th width="32%">수정 / 삭제</th></tr>';
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:20px;color:#888;">등록된 구/군이 없습니다.</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(function(r){
    return '<tr>' +
      '<td>' + r.jung_num + '</td>' +
      '<td>' + esc(r.jung_name) + '</td>' +
      '<td>' + getBigName(r.jung_big_cate) + '</td>' +
      '<td>' +
        '<span class="link_btn_bg_s"><a href="#" onclick="openJungCartEdit('+r.jung_num+',\''+esc(r.jung_name)+'\','+r.jung_big_cate+'); return false;">수정</a></span> ' +
        '<span class="link_btn_bg_s"><a href="#" onclick="deleteJungCart('+r.jung_num+'); return false;">삭제</a></span>' +
      '</td></tr>';
  }).join('');
}

// ── 모달 ──────────────────────────────────────────────────────────────────────
function openRegModal() {
  editIdx = null;
  document.getElementById('modal-title').textContent = regLabels[currentTab];
  buildModalFields(null);
  document.getElementById('modal-overlay').style.display = 'flex';
}

function openEditModal(idx) {
  editIdx = idx;
  var row = rowMap[idx];
  if (!row) return;
  document.getElementById('modal-title').textContent = '수정';
  buildModalFields(row);
  document.getElementById('modal-overlay').style.display = 'flex';
}

function openBigCartEdit(num, name) {
  editIdx = num;
  document.getElementById('modal-title').textContent = '지역 수정';
  document.getElementById('modal-fields').innerHTML =
    '<div class="mrow"><label>지역명</label><input id="f-bname" type="text" value="'+esc(name)+'" /></div>';
  document.getElementById('modal-overlay').style.display = 'flex';
}

function openJungCartEdit(num, name, bigCate) {
  editIdx = num;
  document.getElementById('modal-title').textContent = '구/군 수정';
  var html = '<div class="mrow"><label>상위지역</label><select id="f-jbig">' +
    '<option value="0">-- 선택 --</option>' +
    bigCartData.map(function(b){
      return '<option value="'+b.big_num+'"'+(b.big_num==bigCate?' selected':'')+'>'+esc(b.big_name)+'</option>';
    }).join('') + '</select></div>';
  html += '<div class="mrow"><label>구/군명</label><input id="f-jname" type="text" value="'+esc(name)+'" /></div>';
  document.getElementById('modal-fields').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function buildModalFields(row) {
  var r = row || {};
  var html = '';

  if (currentTab <= 3) {
    html += '<div class="mrow"><label>아이디</label><input id="f-mid" type="text" value="' + esc(r.mem_id||'') + '"' +
            (row ? ' readonly' : '') + ' /></div>';
    html += '<div class="mrow"><label>비밀번호</label><input id="f-mpw" type="password" placeholder="' +
            (row ? '변경 시에만 입력' : '필수') + '" /></div>';
    html += '<div class="mrow"><label>이름</label><input id="f-mnm" type="text" value="' + esc(r.mem_name||'') + '" /></div>';

    if (currentTab >= 2) {
      html += '<div class="mrow"><label>전화번호</label><input id="f-mtel" type="text" value="' + esc(r.mem_tel||'') + '" /></div>';

      var bigOpts = '<option value="0">-- 선택 --</option>' +
        bigCartData.map(function(b){
          return '<option value="'+b.big_num+'"'+(r.c1==b.big_num?' selected':'')+'>'+esc(b.big_name)+'</option>';
        }).join('');
      html += '<div class="mrow"><label>지역</label><select id="f-c1" onchange="onC1Change()">' + bigOpts + '</select></div>';

      var filteredJung = r.c1
        ? jungCartData.filter(function(j){ return j.jung_big_cate == r.c1; })
        : [];
      var jungOpts = '<option value="0">-- 선택 --</option>' +
        filteredJung.map(function(j){
          return '<option value="'+j.jung_num+'"'+(r.c2==j.jung_num?' selected':'')+'>'+esc(j.jung_name)+'</option>';
        }).join('');
      html += '<div class="mrow"><label>구/군</label><select id="f-c2">' + jungOpts + '</select></div>';
    }

    html += '<div class="mrow"><label>비고</label><input id="f-etc" type="text" value="' + esc(r.etc_value||'') + '" /></div>';

    if (currentTab <= 2) {
      html += '<div class="mrow"><label style="width:110px;">번호(게이트웨이)</label><input id="f-gwno" type="text" inputmode="numeric" value="' + esc(r.gateway_no||'') + '" /></div>';
    }

  } else if (currentTab === 4) {
    html += '<div class="mrow"><label>지역명</label><input id="f-bname" type="text" value="" /></div>';

  } else {
    var bigOpts2 = '<option value="0">-- 선택 --</option>' +
      bigCartData.map(function(b){
        return '<option value="'+b.big_num+'">'+esc(b.big_name)+'</option>';
      }).join('');
    html += '<div class="mrow"><label>상위지역</label><select id="f-jbig">' + bigOpts2 + '</select></div>';
    html += '<div class="mrow"><label>구/군명</label><input id="f-jname" type="text" value="" /></div>';
  }

  document.getElementById('modal-fields').innerHTML = html;
}

function onC1Change() {
  var c1 = parseInt(gv('f-c1')) || 0;
  var sel = document.getElementById('f-c2');
  if (!sel) return;
  sel.innerHTML = '<option value="0">-- 선택 --</option>' +
    jungCartData.filter(function(j){ return j.jung_big_cate == c1; }).map(function(j){
      return '<option value="'+j.jung_num+'">'+esc(j.jung_name)+'</option>';
    }).join('');
}

function overlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
  editIdx = null;
}

function saveModal() {
  var title = document.getElementById('modal-title').textContent;

  // 지역 수정 모달
  if (title === '지역 수정') {
    var nm = gv('f-bname');
    if (!nm) { alert('지역명을 입력하세요.'); return; }
    fetch('/api/members/big-cart/' + editIdx, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({big_name: nm})
    }).then(function(r){return r.json();}).then(function(j){
      if(j.ok){ closeModal(); loadData(); } else alert('저장 실패: '+(j.error||''));
    });
    return;
  }

  // 구/군 수정 모달
  if (title === '구/군 수정') {
    var big = parseInt(gv('f-jbig')) || 0;
    var jnm = gv('f-jname');
    if (!big || !jnm) { alert('상위지역과 명칭을 입력하세요.'); return; }
    fetch('/api/members/jung-cart/' + editIdx, {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({jung_name: jnm, jung_big_cate: big})
    }).then(function(r){return r.json();}).then(function(j){
      if(j.ok){ closeModal(); loadData(); } else alert('저장 실패: '+(j.error||''));
    });
    return;
  }

  // MEMBER 탭 1-3
  if (currentTab <= 3) {
    var mid = gv('f-mid'), mpw = gv('f-mpw'), mnm = gv('f-mnm');
    if (!mid) { alert('아이디를 입력하세요.'); return; }
    if (!editIdx && !mpw) { alert('비밀번호를 입력하세요.'); return; }
    if (!mnm) { alert('이름을 입력하세요.'); return; }
    var data = {
      mem_id:    mid,
      mem_name:  mnm,
      mem_type:  currentTab,
      mem_tel:   gv('f-mtel'),
      c1:        parseInt(gv('f-c1'))  || 0,
      c2:        parseInt(gv('f-c2'))  || 0,
      etc_value: gv('f-etc')
    };
    if (mpw) data.mem_pwd = mpw;
    if (currentTab <= 2) data.gateway_no = gv('f-gwno');
    fetch(editIdx ? '/api/members/' + editIdx : '/api/members', {
      method: editIdx ? 'PUT' : 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(data)
    }).then(function(r){return r.json();}).then(function(j){
      if(j.ok){ closeModal(); loadData(); } else alert('저장 실패: '+(j.error||''));
    });

  // 지역 카테고리 신규 등록
  } else if (currentTab === 4) {
    var nm2 = gv('f-bname');
    if (!nm2) { alert('지역명을 입력하세요.'); return; }
    fetch('/api/members/big-cart', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({big_name: nm2})
    }).then(function(r){return r.json();}).then(function(j){
      if(j.ok){ closeModal(); loadData(); } else alert('저장 실패: '+(j.error||''));
    });

  // 구/군 카테고리 신규 등록
  } else {
    var big2 = parseInt(gv('f-jbig')) || 0;
    var jnm2 = gv('f-jname');
    if (!big2 || !jnm2) { alert('상위지역과 명칭을 입력하세요.'); return; }
    fetch('/api/members/jung-cart', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({jung_name: jnm2, jung_big_cate: big2})
    }).then(function(r){return r.json();}).then(function(j){
      if(j.ok){ closeModal(); loadData(); } else alert('저장 실패: '+(j.error||''));
    });
  }
}

// ── 삭제 ──────────────────────────────────────────────────────────────────────
function deleteMember(idx) {
  if (!confirm('정말 삭제하시겠습니까?')) return;
  fetch('/api/members/' + idx, {method:'DELETE'})
    .then(function(r){return r.json();})
    .then(function(j){ if(j.ok) loadData(); else alert('삭제 실패: '+(j.error||'')); });
}

  if (!confirm('삭제하시겠습니까?')) return;
  fetch('/api/members/big-cart/' + num, {method:'DELETE'})
    .then(function(r){return r.json();})
    .then(function(j){ if(j.ok) loadData(); else alert('삭제 실패: '+(j.error||'')); });

  if (!confirm('삭제하시겠습니까?')) return;
  fetch('/api/members/jung-cart/' + num, {method:'DELETE'})
    .then(function(r){return r.json();})
    .then(function(j){ if(j.ok) loadData(); else alert('삭제 실패: '+(j.error||'')); });
}

// ── 검색 ──────────────────────────────────────────────────────────────────────
function doSearch() {
  var sw    = document.getElementById('sw').value;
  var sword = document.getElementById('sword').value.toLowerCase().trim();
  if (!sword) { renderMembers(currentRows); return; }
  var filtered = currentRows.filter(function(r){
    var v = (sw === 'mem_id' ? r.mem_id : r.mem_name) || '';
    return v.toLowerCase().indexOf(sword) >= 0;
  });
  renderMembers(filtered);
}
loadTopbarUser();
</script>
