  <script>
    (function () {
      var d = new Date();
      var el = document.getElementById('topDate');
      if (el) {
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, '0');
        var day = String(d.getDate()).padStart(2, '0');
        el.textContent = y + '.' + m + '.' + day;
      }
    })();

    var allRows = [];
    var currentTab = 1;

    var homeMap = null;
    var homeMarkers = [];
    var homeInfowindow = null;
    var mapSdkLoaded = false;
    var mapSdkLoading = false;
    var mapSdkCallbacks = [];

    function loadMapSdk(cb) {
      if (mapSdkLoaded) { cb(); return; }
      mapSdkCallbacks.push(cb);
      if (mapSdkLoading) return;
      mapSdkLoading = true;
      var s = document.createElement('script');
      s.src = 'https://dapi.kakao.com/v2/maps/sdk.js?appkey=4f8113e9d33b19b56daeda4b73e65b78&autoload=false';
      s.onload = function () {
        kakao.maps.load(function () {
          mapSdkLoaded = true;
          var fns = mapSdkCallbacks.slice();
          mapSdkCallbacks = [];
          fns.forEach(function (f) { try { f(); } catch (e) { console.error('[HomeMap]', e); } });
        });
      };
      s.onerror = function () { console.error('[HomeMap] SDK load failed'); };
      document.head.appendChild(s);
    }

    function initHomeMap(cb) {
      loadMapSdk(function () {
        if (!homeMap) {
          var container = document.getElementById('home-map');
          homeMap = new kakao.maps.Map(container, {
            center: new kakao.maps.LatLng(37.5665, 126.9780),
            level: 8
          });
          homeInfowindow = new kakao.maps.InfoWindow({ zIndex: 1 });
        }
        if (cb) cb();
      });
    }

    function renderMapMarkers(rows) {
      if (!homeMap) {
        initHomeMap(function () { renderMapMarkers(rows); });
        return;
      }
      homeMarkers.forEach(function (m) { m.setMap(null); });
      homeMarkers = [];
      homeInfowindow.close();

      var filtered = rows.filter(function (r) {
        var la = parseFloat(r.lat);
        var lo = parseFloat(r.lng);
        return la && lo && la !== 0 && lo !== 0;
      });

      if (filtered.length === 0) {
        homeMap.setCenter(new kakao.maps.LatLng(37.5665, 126.9780));
        homeMap.setLevel(8);
        return;
      }

      var bounds = new kakao.maps.LatLngBounds();

      filtered.forEach(function (r) {
        var pos = new kakao.maps.LatLng(parseFloat(r.lat), parseFloat(r.lng));
        var marker = new kakao.maps.Marker({ map: homeMap, position: pos });
        var infoContent = '<div style="padding:6px 10px;font-size:12px;line-height:1.6;">'
          + '<strong>' + (r.bell_name || String(r.phone_no)) + '</strong>'
          + '<br>' + formatKST(r.occurred_at)
          + '</div>';
        (function (m, c) {
          kakao.maps.event.addListener(m, 'click', function () {
            homeInfowindow.setContent(c);
            homeInfowindow.open(homeMap, m);
          });
        })(marker, infoContent);
        homeMarkers.push(marker);
        bounds.extend(pos);
      });

      if (filtered.length === 1) {
        homeMap.setCenter(new kakao.maps.LatLng(parseFloat(filtered[0].lat), parseFloat(filtered[0].lng)));
        homeMap.setLevel(5);
      } else {
        homeMap.setBounds(bounds);
      }
    }

    function formatKST(isoStr) {
      if (!isoStr) return '-';
      var d = new Date(isoStr);
      var kst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
      var y = kst.getUTCFullYear();
      var mo = String(kst.getUTCMonth() + 1).padStart(2, '0');
      var day = String(kst.getUTCDate()).padStart(2, '0');
      var h = String(kst.getUTCHours()).padStart(2, '0');
      var mi = String(kst.getUTCMinutes()).padStart(2, '0');
      var sec = String(kst.getUTCSeconds()).padStart(2, '0');
      return y + '-' + mo + '-' + day + ' ' + h + ':' + mi + ':' + sec;
    }

    function renderRows(rows) {
      var tbody = document.getElementById('layout-tbody');
      if (!tbody) return;
      var html = '';
      for (var i = 0; i < rows.length; i++) {
        var r = rows[i];
        var no = i + 1;
        var noCell = r.machine_no != null
          ? (no + '<br><span style="color:#0000cc;">' + r.machine_no + '</span>')
          : String(no);
        var timeCell = formatKST(r.occurred_at);
        if (r.bell_name) {
          timeCell += '<br><span style="color:red;">' + r.bell_name + '</span>';
        }
        var statusCell;
        if (r.status === '경보발생') {
          statusCell = '<strong><span style="color:#cc0000;">경보발생 (01)</span></strong>';
        } else if (r.status === '정상복구') {
          statusCell = '<span style="color:#2244aa;">정상복구 (03)</span>';
        } else {
          statusCell = r.status || '-';
        }
        var tdNo   = ' style="padding:8px 4px;white-space:nowrap;text-align:center;"';
        var tdAddr = ' style="padding:8px 4px;word-break:break-all;"';
        var tdRest = ' style="padding:8px 4px;overflow-wrap:break-word;"';
        html += '<tr>'
          + '<td' + tdNo   + '>' + noCell + '</td>'
          + '<td' + tdRest + '>' + (r.region || '') + '</td>'
          + '<td' + tdAddr + '>' + (r.address || '') + '</td>'
          + '<td' + tdRest + '>' + timeCell + '</td>'
          + '<td' + tdRest + '>' + statusCell + '</td>'
          + '<td' + tdRest + '><span class="link_btn_bg_s"><a href="#" onclick="return false;">조치현황</a></span></td>'
          + '</tr>';
      }
      if (html === '') {
        html = '<tr><td colspan="6">데이터가 없습니다</td></tr>';
      }
      tbody.innerHTML = html;
    }

    function MapType(tab) {
      currentTab = tab;
      if (tab === 1) {
        document.getElementById('map1').className = 'tab_ov';
        document.getElementById('map2').className = 'tab_';
        renderRows(allRows);
      } else {
        document.getElementById('map1').className = 'tab_';
        document.getElementById('map2').className = 'tab_ov';
        var unresolved = allRows.filter(function (r) {
          return r.status === '경보발생';
        });
        renderRows(unresolved);
      }
    }

    function renderBadges(s) {
      var unadj = document.getElementById('layout-badge-unadjusted');
      var alarm = document.getElementById('layout-badge-alarm');
      if (unadj) unadj.textContent = s.alarm_active;
      if (alarm) alarm.textContent = s.alarm_today;
    }

    function loadData() {
      fetch('/api/events')
        .then(function (res) { return res.json(); })
        .then(function (j) {
          if (!j.ok) throw new Error('ok:false');
          allRows = j.rows;
          MapType(currentTab);
          renderMapMarkers(allRows);
        })
        .catch(function () {
          var tbody = document.getElementById('layout-tbody');
          if (tbody) tbody.innerHTML = '<tr><td colspan="6">데이터를 불러오지 못했습니다</td></tr>';
        });

      fetch('/api/stats/summary')
        .then(function (res) { return res.json(); })
        .then(function (j) { if (j.ok) renderBadges(j); })
        .catch(function () {});
    }

    initHomeMap();
    loadData();
    setInterval(loadData, 30000);
    loadTopbarUser();
  </script>
